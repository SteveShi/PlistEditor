name: PlistEditor

options:
  bundleIdPrefix: com.steveshi
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.1.4"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0

targets:
  PlistEditor:
    type: application
    platform: macOS
    info:
      path: Resources/Info.plist
      properties:
        SUFeedURL: https://github.com/SteveShi/PlistEditor/releases/latest/download/appcast.xml
        SUPublicEDKey: MkHAeSDd//tR7+jzLDuwomA0aHHe5+35hbQ4csagwF0=
        SUEnableAutomaticChecks: YES
        SUScheduledCheckInterval: 86400
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Property List"
            CFBundleTypeRole: "Editor"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "com.apple.property-list"
          - CFBundleTypeName: "JSON"
            CFBundleTypeRole: "Editor"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "public.json"
          - CFBundleTypeName: "XML"
            CFBundleTypeRole: "Editor"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "public.xml"
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_NAME: PlistEditor
        PRODUCT_BUNDLE_IDENTIFIER: com.steveshi.plisteditor
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 轩楝 (Steve Shi)."
        INFOPLIST_KEY_SUFeedURL: https://github.com/SteveShi/PlistEditor/releases/latest/download/appcast.xml
        INFOPLIST_KEY_SUPublicEDKey: MkHAeSDd//tR7+jzLDuwomA0aHHe5+35hbQ4csagwF0=
        INFOPLIST_KEY_SUEnableAutomaticChecks: YES
        INFOPLIST_KEY_SUScheduledCheckInterval: 86400
